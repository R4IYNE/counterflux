<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counterflux -- The Aetheric Archive</title>
  <link rel="preload" href="/src/styles/fonts/SpaceGrotesk-Variable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/src/styles/fonts/JetBrainsMono-Variable.woff2" as="font" type="font/woff2" crossorigin>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body x-data @keydown.escape.window="$store.search.flyoutOpen ? $store.search.closeFlyout() : $store.search.clear()" @keydown.slash.window="if (!['INPUT','TEXTAREA','SELECT'].includes($event.target.tagName)) { $event.preventDefault(); (document.getElementById('global-search-input') || document.querySelector('header input[type=text]'))?.focus(); }">

  <!-- Splash Screen: blocks all interaction until bulk data is ready -->
  <div
    x-data="splashScreen"
    x-show="isVisible"
    x-transition:leave="transition ease-in duration-300"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-center justify-center"
    style="background-color: var(--color-background, #0B0C10);"
  >
    <div class="flex flex-col items-center gap-8 max-w-[480px] w-full px-8">
      <h1 class="syne-header text-[48px] font-bold tracking-[-0.02em] leading-[1.1] text-center"
          style="color: var(--color-text-primary, #EAECEE);">
        COUNTERFLUX
      </h1>
      <img src="/assets/assetsmila-izzet.png" alt="Mila the Corgi, Izzet Engineer"
        class="w-32 h-32 object-contain animate-pulse">
      <h2 class="syne-header text-[20px] font-bold leading-[1.2] tracking-[0.01em] text-center"
          style="color: var(--color-text-primary, #EAECEE);">
        Initializing Aetheric Archive...
      </h2>
      <div class="w-full h-1 ghost-border" style="background-color: var(--color-border-ghost, #2A2D3A);">
        <div class="h-full transition-all duration-300" style="background-color: var(--color-primary, #0D52BD);"
          :style="{ width: $store.bulkdata.progress + '%' }"></div>
      </div>
      <div class="w-full text-center">
        <p x-show="$store.bulkdata.status === 'downloading'"
          class="mono-data text-[11px] font-normal uppercase tracking-[0.15em]"
          style="color: var(--color-text-muted, #7A8498);">
          DOWNLOADING BULK DATA: <span x-text="$store.bulkdata.downloadedMB"></span>MB / <span x-text="$store.bulkdata.totalMB"></span>MB
        </p>
        <p x-show="$store.bulkdata.status === 'parsing'"
          class="mono-data text-[11px] font-normal uppercase tracking-[0.15em]"
          style="color: var(--color-text-muted, #7A8498);">
          PARSING CARD DATABASE: <span x-text="$store.bulkdata.parsed.toLocaleString()"></span> CARDS
        </p>
        <p x-show="$store.bulkdata.status === 'checking' || $store.bulkdata.status === 'idle'"
          class="mono-data text-[11px] font-normal uppercase tracking-[0.15em]"
          style="color: var(--color-text-muted, #7A8498);">
          CHECKING FOR UPDATES...
        </p>
        <p x-show="$store.bulkdata.status === 'ready'"
          class="mono-data text-[11px] font-bold uppercase tracking-[0.15em]"
          style="color: var(--color-success, #2ECC71);">
          ARCHIVE READY. <span x-text="$store.bulkdata.totalCards.toLocaleString()"></span> CARDS INDEXED.
        </p>
        <template x-if="$store.bulkdata.status === 'error'">
          <div class="flex flex-col items-center gap-4">
            <p class="mono-data text-[11px] font-normal uppercase tracking-[0.15em]"
               style="color: var(--color-secondary, #E23838);" x-text="$store.bulkdata.error"></p>
            <button @click="$store.bulkdata.retry()"
              class="mono-data text-[11px] font-bold uppercase tracking-[0.15em] px-6 py-2 cursor-pointer"
              style="background-color: var(--color-secondary, #E23838); color: var(--color-text-primary, #EAECEE);">
              RETRY DOWNLOAD
            </button>
          </div>
        </template>
      </div>
      <p x-show="$store.bulkdata.status !== 'error'"
        class="text-[14px] italic text-center leading-[1.5] max-w-[400px]"
        style="color: var(--color-text-muted, #7A8498); font-family: 'Space Grotesk', sans-serif;"
        x-text="flavourText"></p>
    </div>
  </div>

  <!-- App shell (visible when data ready or bulkdata store not yet registered) -->
  <div x-show="$store.bulkdata?.isReady !== false" x-cloak>

    <!-- Sidebar -->
    <aside
      :class="$store.app.sidebarCollapsed ? 'w-16' : 'w-60'"
      class="fixed left-0 top-0 bottom-0 z-30 bg-background border-r border-border-ghost transition-all duration-200 flex flex-col"
    >
      <!-- Brand section -->
      <div class="pt-2xl px-4 flex flex-col items-center gap-xs">
        <span class="material-symbols-outlined text-primary text-3xl">cyclone</span>
        <span
          x-show="!$store.app.sidebarCollapsed"
          class="font-mono text-text-primary uppercase text-[11px] tracking-[0.3em] font-bold"
        >COUNTERFLUX</span>
        <span
          x-show="!$store.app.sidebarCollapsed"
          class="font-mono text-text-dim uppercase text-[11px] tracking-[0.15em] font-normal"
        >V1.0</span>
      </div>

      <!-- Navigation items -->
      <nav class="mt-lg flex flex-col gap-sm px-2">
        <template x-for="screen in $store.app.screens" :key="screen.id">
          <a
            :href="screen.locked ? 'javascript:void(0)' : '#' + screen.route"
            :class="[
              'flex items-center gap-sm py-2 px-4 transition-colors duration-150',
              screen.locked
                ? 'text-text-dim cursor-not-allowed opacity-50'
                : $store.app.currentScreen === screen.id
                  ? 'bg-primary/10 text-primary border-r-4 border-primary'
                  : 'text-text-muted hover:bg-primary/5 hover:text-primary'
            ]"
            :aria-label="screen.label"
            :aria-current="$store.app.currentScreen === screen.id ? 'page' : false"
            :aria-disabled="screen.locked"
            @click.prevent="!screen.locked && $store.app.currentScreen !== screen.id && (window.__counterflux_router ? window.__counterflux_router.navigate(screen.route) : null)"
          >
            <span class="material-symbols-outlined text-2xl" x-text="screen.icon"></span>
            <span
              x-show="!$store.app.sidebarCollapsed"
              x-text="screen.label"
              class="font-mono uppercase text-[11px] tracking-[0.15em] font-normal whitespace-nowrap"
            ></span>
          </a>
        </template>
      </nav>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Mila avatar (bottom) -->
      <div class="pb-4 px-2">
        <div class="flex items-center gap-sm px-2 py-2">
          <img
            src="/assets/assetsmila-izzet.png"
            alt="Mila -- Izzet Familiar"
            class="w-10 h-10 rounded-full object-cover transition-all duration-300"
            style="filter: grayscale(0.8) brightness(0.7);"
            onmouseenter="this.style.filter='grayscale(0) brightness(1)'"
            onmouseleave="this.style.filter='grayscale(0.8) brightness(0.7)'"
          >
          <span
            x-show="!$store.app.sidebarCollapsed"
            class="font-mono text-text-dim uppercase text-[11px] tracking-[0.15em] font-normal"
          >MILA</span>
        </div>
      </div>
    </aside>

    <!-- Topbar -->
    <header
      :class="$store.app.sidebarCollapsed ? 'ml-16' : 'ml-60'"
      class="fixed top-0 right-0 z-40 h-16 glass-overlay border-b border-border-ghost flex items-center justify-between px-xl transition-all duration-200"
    >
      <!-- Title -->
      <h1 class="font-header text-xl font-bold text-text-primary whitespace-nowrap" style="font-size: 20px; line-height: 1.2; letter-spacing: 0.01em;">
        COUNTERFLUX
      </h1>

      <!-- Topbar search -->
      <div class="flex-1 flex justify-center px-xl">
        <div style="position: relative; width: 100%; max-width: 480px;">
          <span class="material-symbols-outlined" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--color-text-dim);">search</span>
          <input
            type="text"
            placeholder="QUERY DATABASE..."
            :value="$store.search.query"
            @input="$store.search.search($event.target.value)"
            @keydown.arrow-down.prevent="$store.search.moveSelection(1)"
            @keydown.arrow-up.prevent="$store.search.moveSelection(-1)"
            @keydown.enter.prevent="$store.search.confirmSelection()"
            @keydown.escape="$store.search.clear(); $el.blur()"
            @focus="$store.search._topbarFocused = true"
            @blur="setTimeout(() => $store.search._topbarFocused = false, 200)"
            autocomplete="off"
            style="width: 100%; background: var(--color-surface, #14161C); border: 1px solid var(--color-border-ghost, #2A2D3A); color: var(--color-text-primary, #E8E6E3); padding: 8px 12px 8px 36px; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; outline: none; box-sizing: border-box;"
            onfocus="this.style.borderColor='var(--color-primary, #0D52BD)'"
            onblur="this.style.borderColor='var(--color-border-ghost, #2A2D3A)'"
          >
          <!-- Topbar autocomplete dropdown -->
          <div
            x-show="($store.search._topbarFocused || false) && ($store.search.results.length > 0 || ($store.search.loading && $store.search.query.length >= 2) || (!$store.search.loading && $store.search.query.length >= 2 && $store.search.results.length === 0))"
            @click.outside="$store.search.clear()"
            style="position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: var(--color-surface, #14161C); border: 1px solid var(--color-border-ghost, #2A2D3A); max-height: 360px; overflow-y: auto; z-index: 50; box-shadow: 0 0 20px rgba(13, 82, 189, 0.1);"
          >
            <div x-show="$store.search.loading" style="padding: 10px 14px; display: flex; align-items: center; gap: 8px;">
              <span class="material-symbols-outlined text-primary" style="font-size: 16px;">progress_activity</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--color-text-muted, #8A8F98);">Searching archive...</span>
            </div>
            <div x-show="!$store.search.loading && $store.search.query.length >= 2 && $store.search.results.length === 0" style="padding: 10px 14px;">
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--color-text-muted, #8A8F98);">No cards match your query.</span>
            </div>
            <template x-for="(result, index) in $store.search.results" :key="result.id">
              <button
                @click="$store.search.selectResult(result)"
                @mouseenter="$store.search.selectedIndex = index"
                :style="$store.search.selectedIndex === index ? 'background: var(--color-surface-hover, #1C1F28);' : ''"
                style="width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 14px; text-align: left; border: none; cursor: pointer; background: transparent;"
                onmouseenter="this.style.background='var(--color-surface-hover, #1C1F28)'"
                onmouseleave="this.style.background='transparent'"
              >
                <div style="width: 32px; height: 32px; flex-shrink: 0; overflow: hidden; background: var(--color-surface-hover, #1C1F28);">
                  <img :src="result._thumbnail" :alt="result._name" style="width: 100%; height: 100%; object-fit: cover;" loading="lazy" onerror="this.style.display='none'">
                </div>
                <span style="font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; color: var(--color-text-primary, #E8E6E3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" x-text="result._name"></span>
                <i class="ss" :class="'ss-' + result.set" style="font-size: 14px; color: var(--color-text-dim); flex-shrink: 0;"></i>
                <span style="display: flex; align-items: center; gap: 2px; flex-shrink: 0;" x-html="window.renderManaCost(result._manaCost)"></span>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Right section -->
      <div class="flex items-center gap-md">
        <button class="text-text-muted hover:text-text-primary transition-colors" aria-label="Notifications">
          <span class="material-symbols-outlined text-2xl">notifications</span>
        </button>
        <img
          src="/assets/assetsmila-izzet.png"
          alt="Mila"
          class="w-6 h-6 rounded-full object-cover"
          style="filter: grayscale(0.5);"
        >
      </div>
    </header>

    <!-- Main content -->
    <main
      :class="$store.app.sidebarCollapsed ? 'ml-16' : 'ml-60'"
      class="mt-16 p-xl min-h-screen transition-all duration-200"
    >
      <div id="main-content"></div>
    </main>

  </div>

  <!-- Card Detail Flyout -->
  <template x-if="$store.search.flyoutOpen && $store.search.selectedCard">
    <div>
      <!-- Backdrop -->
      <div
        class="fixed inset-0 z-40"
        style="background-color: rgba(11, 12, 16, 0.6);"
        @click="$store.search.closeFlyout()"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
      ></div>

      <!-- Flyout panel -->
      <aside
        class="fixed top-0 right-0 bottom-0 w-[400px] z-45 bg-surface border-l border-border-ghost overflow-y-auto"
        style="box-shadow: -4px 0 20px rgba(13, 82, 189, 0.15);"
        x-transition:enter="transition ease-out duration-300 transform"
        x-transition:enter-start="translate-x-full"
        x-transition:enter-end="translate-x-0"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="translate-x-0"
        x-transition:leave-end="translate-x-full"
      >
        <!-- Close button -->
        <button
          @click="$store.search.closeFlyout()"
          class="absolute top-4 right-4 text-text-muted hover:text-text-primary transition-colors z-10 cursor-pointer"
          aria-label="Close card detail"
        >
          <span class="material-symbols-outlined text-2xl">close</span>
        </button>

        <!-- Overline -->
        <div class="px-md pt-lg pb-sm">
          <span class="font-mono uppercase text-[11px] tracking-[0.15em] font-bold text-primary">CARD DETAIL</span>
        </div>

        <!-- Card image -->
        <div class="px-md pb-md">
          <img
            :src="$store.search.selectedCard._image"
            :alt="$store.search.selectedCard._name"
            class="w-full object-contain"
            style="aspect-ratio: 488/680;"
            loading="eager"
          >
        </div>

        <!-- Card info -->
        <div class="px-md flex flex-col gap-md pb-lg">
          <!-- Name -->
          <h2 class="font-header text-[20px] font-bold leading-[1.2] tracking-[0.01em] text-text-primary" x-text="$store.search.selectedCard._name"></h2>

          <!-- Type line -->
          <p class="font-mono uppercase text-[11px] tracking-[0.15em] font-normal text-text-muted" x-text="$store.search.selectedCard._typeLine"></p>

          <!-- Mana cost -->
          <div class="flex items-center gap-[2px]" x-html="window.renderManaCost($store.search.selectedCard._manaCost)"></div>

          <!-- Oracle text -->
          <div class="font-body text-[14px] leading-[1.5] text-text-primary whitespace-pre-line" x-text="$store.search.selectedCard._oracleText" style="font-family: 'Space Grotesk', sans-serif;"></div>

          <!-- Price section -->
          <div class="pt-sm">
            <span class="font-mono uppercase text-[11px] tracking-[0.15em] font-bold text-primary block mb-sm">MARKET PRICE</span>
            <div class="flex items-baseline gap-md">
              <span
                class="font-header text-[28px] font-bold text-text-primary"
                x-text="$store.search.selectedCard.prices?.usd ? '$' + $store.search.selectedCard.prices.usd : 'N/A'"
              ></span>
              <span
                x-show="$store.search.selectedCard.prices?.usd_foil"
                class="font-mono uppercase text-[11px] tracking-[0.15em] font-normal text-text-muted"
                x-text="$store.search.selectedCard.prices?.usd_foil ? 'Foil: $' + $store.search.selectedCard.prices.usd_foil : ''"
              ></span>
            </div>
          </div>

          <!-- Legalities section -->
          <div class="pt-sm">
            <span class="font-mono uppercase text-[11px] tracking-[0.15em] font-bold text-primary block mb-sm">FORMAT LEGALITIES</span>
            <div class="grid grid-cols-2 gap-sm">
              <template x-for="format in ['commander', 'standard', 'modern', 'legacy', 'vintage', 'pauper', 'pioneer']" :key="format">
                <div
                  :class="{
                    'bg-success/20 text-success': $store.search.selectedCard.legalities?.[format] === 'legal',
                    'bg-secondary/20 text-secondary': $store.search.selectedCard.legalities?.[format] === 'banned',
                    'bg-surface-hover text-text-dim': $store.search.selectedCard.legalities?.[format] !== 'legal' && $store.search.selectedCard.legalities?.[format] !== 'banned'
                  }"
                  class="px-3 py-1 font-mono uppercase text-[11px] tracking-[0.15em] font-normal text-center"
                >
                  <span x-text="format"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="pt-md flex flex-col gap-sm">
            <button
              class="w-full px-4 py-3 font-mono uppercase text-[11px] tracking-[0.15em] font-bold text-text-dim bg-surface-hover opacity-50 cursor-not-allowed"
              disabled
              title="Available in Phase 2"
            >
              Add to Collection
            </button>
            <button
              @click="window.open($store.search.selectedCard.scryfall_uri, '_blank')"
              class="w-full px-4 py-3 font-mono uppercase text-[11px] tracking-[0.15em] font-bold text-text-primary bg-primary hover:bg-primary/80 transition-colors cursor-pointer"
            >
              View on Scryfall
            </button>
          </div>
        </div>
      </aside>
    </div>
  </template>

  <!-- Toast container -->
  <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-sm" style="max-width: 400px;">
    <template x-for="toast in ($store.toast?.items || [])" :key="toast.id">
      <div
        x-show="toast.visible"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-2"
        :class="{
          'bg-primary/20 border-primary/40': toast.type === 'info',
          'bg-success/20 border-success/40': toast.type === 'success',
          'bg-warning/20 border-warning/40': toast.type === 'warning',
          'bg-secondary/20 border-secondary/40': toast.type === 'error'
        }"
        class="border px-4 py-3 flex items-start gap-sm"
      >
        <span
          class="material-symbols-outlined text-xl flex-shrink-0 mt-0.5"
          :class="{
            'text-primary': toast.type === 'info',
            'text-success': toast.type === 'success',
            'text-warning': toast.type === 'warning',
            'text-secondary': toast.type === 'error'
          }"
          x-text="toast.type === 'info' ? 'info' : toast.type === 'success' ? 'check_circle' : toast.type === 'warning' ? 'warning' : 'error'"
        ></span>
        <p class="font-body text-text-primary text-sm flex-1" x-text="toast.message" style="font-size: 14px; line-height: 1.5;"></p>
        <button
          @click="$store.toast.dismiss(toast.id)"
          class="text-text-dim hover:text-text-primary transition-colors flex-shrink-0"
          aria-label="Dismiss notification"
        >
          <span class="material-symbols-outlined text-lg">close</span>
        </button>
      </div>
    </template>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
