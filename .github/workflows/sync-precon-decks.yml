name: Sync precon deck memberships

on:
  # Sunday 03:00 UTC. MTGJSON publishes daily; weekly is enough cadence to
  # catch new multi-deck Commander products within ~7 days of release.
  schedule:
    - cron: '0 3 * * 0'
  # Manual trigger for dev urgency (a product just released, can't wait
  # for the next cron tick).
  workflow_dispatch:

# Only one sync at a time — second concurrent run would race the commit.
concurrency:
  group: sync-precon-decks
  cancel-in-progress: false

permissions:
  contents: write

# Opt the action runtimes onto Node.js 24 ahead of GitHub's June 2026
# forced cutover (deprecation warning surfaced in the 2026-04-27 manual run).
# Both actions/checkout@v4 and actions/setup-node@v4 currently default to
# Node 20; setting this env var globally flips them without a version bump.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run sync script
        run: node scripts/sync-precon-decks.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet src/data/precon-deck-memberships.json; then
            echo "No changes — MTGJSON output unchanged."
            exit 0
          fi
          git config user.name 'counterflux-bot'
          git config user.email 'noreply@github.com'
          git add src/data/precon-deck-memberships.json

          # Summarise what changed for the commit body — diff stat for the
          # bundle/deck counts in the JSON's metadata header.
          summary=$(node -e "
            const j = require('./src/data/precon-deck-memberships.json');
            console.log(\`bundles=\${j.bundle_count} decks=\${j.deck_count} cards=\${j.card_count}\`);
          ")

          git commit -m "chore(precons): weekly MTGJSON deck-membership sync

          $summary

          Auto-generated by .github/workflows/sync-precon-decks.yml.
          Triggered: \${GITHUB_EVENT_NAME:-schedule}.
          "
          git push
